<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Static SEO fallbacks for non-JS scrapers (homepage defaults). When the app
         boots, main.tsx removes [data-seo-default] and TanStack Router's
         <HeadContent /> takes over with the correct per-route tags. -->
    <title data-seo-default>Nijam — Playwright test analytics &amp; flakiness dashboard</title>
    <meta
      data-seo-default
      name="description"
      content="The missing dashboard for your Playwright suite — run history, flakiness scoring, and failure traces from every CI run. Think Sentry, for Playwright."
    />
    <meta data-seo-default property="og:type" content="website" />
    <meta data-seo-default property="og:site_name" content="Nijam" />
    <meta
      data-seo-default
      property="og:title"
      content="Nijam — Playwright test analytics &amp; flakiness dashboard"
    />
    <meta
      data-seo-default
      property="og:description"
      content="The missing dashboard for your Playwright suite — run history, flakiness scoring, and failure traces from every CI run."
    />
    <meta data-seo-default property="og:url" content="https://www.nijam.dev" />
    <meta data-seo-default property="og:image" content="https://www.nijam.dev/og.png" />
    <meta data-seo-default name="twitter:card" content="summary_large_image" />
    <meta
      data-seo-default
      name="twitter:title"
      content="Nijam — Playwright test analytics &amp; flakiness dashboard"
    />
    <meta
      data-seo-default
      name="twitter:description"
      content="The missing dashboard for your Playwright suite — run history, flakiness scoring, and failure traces from every CI run."
    />
    <meta data-seo-default name="twitter:image" content="https://www.nijam.dev/og.png" />
    <link data-seo-default rel="canonical" href="https://www.nijam.dev" />
    <!-- Apply the saved theme before first paint to avoid a light->dark flash.
         Mirrors src/components/theme/ThemeProvider.tsx (key + resolution). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('nijam-theme');
          var dark =
            t === 'dark' ||
            ((!t || t === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <!-- Boot loader: paints before the JS bundle loads (and matches the theme),
         so a hard refresh shows a spinner instead of a blank screen. React clears
         #root's children on mount, removing it automatically. -->
    <style>
      body {
        margin: 0;
        background: oklch(1 0 0);
      }
      html.dark body {
        background: oklch(0.148 0.004 228.8);
      }
      #nijam-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #nijam-boot > div {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid oklch(0.56 0.021 213.5 / 25%);
        border-top-color: oklch(0.56 0.021 213.5);
        animation: nijam-boot-spin 0.7s linear infinite;
      }
      html.dark #nijam-boot > div {
        border-color: oklch(0.723 0.014 214.4 / 25%);
        border-top-color: oklch(0.723 0.014 214.4);
      }
      @keyframes nijam-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="nijam-boot"><div></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
