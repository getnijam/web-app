name: Unit (vitest)

# Runs on every PR: install, then run the Vitest unit suite in-process (no preview
# deploy needed). Because the trigger is `pull_request`, branch + PR metadata exist
# natively (GITHUB_HEAD_REF, refs/pull/<n>/merge) and the Nijam Vitest reporter picks
# them up with zero config, so when the ingest secrets are present we also dogfood the
# run into Nijam, and the GitHub App posts a check/comment on the PR.
on:
  pull_request:

# One run per PR; a newer push cancels the older in-flight run.
concurrency:
  group: unit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the PR head
        uses: actions/checkout@v4
        with:
          # The real branch commit (what reviewers see), not the synthetic merge
          # commit, keeps the reported commit/author accurate for the Nijam run.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Re-run only failed: when you click GitHub's "Re-run failed jobs" (which bumps
      # GITHUB_RUN_ATTEMPT above 1), first ask Nijam which tests failed in the previous
      # attempt of THIS run so the re-run executes only those. On the first attempt this
      # is skipped (failed.txt won't exist) and the whole suite runs. fetch-failed is
      # CI-safe (writes an empty file + exits 0 on any error); --export-env writes
      # NIJAM_RERUN (tags the run "failed only") + NIJAM_TEST_NAME_PATTERN. GitHub keeps
      # the same run id and bumps the attempt, so Nijam clubs the re-run automatically.
      - name: Fetch previously-failed tests (on a re-run)
        if: github.run_attempt != '1'
        env:
          NIJAM_API_KEY: ${{ secrets.NIJAM_API_KEY }}
          NIJAM_PROJECT_ID: ${{ secrets.NIJAM_UNIT_PROJECT_ID }}
        run: npx nijam-vitest fetch-failed --output failed.txt --export-env "$GITHUB_ENV"

      # First attempt runs the whole suite; a re-run runs ONLY the previously-failed tests
      # (files from failed.txt, narrowed to the failing test names). Falls back to the full
      # suite if fetch-failed came back empty (e.g. nothing failed before, or Nijam unreachable).
      - name: Run unit tests
        env:
          # Optional: dogfood, upload the run to Nijam (the GitHub App then posts a
          # check/comment on the PR). Inert unless both are set; fork PRs get no
          # secrets, so they still run the suite but skip reporting. Use a dedicated
          # *vitest* project id (a Playwright project is locked to that framework).
          NIJAM_API_KEY: ${{ secrets.NIJAM_API_KEY }}
          NIJAM_PROJECT_ID: ${{ secrets.NIJAM_UNIT_PROJECT_ID }}
        run: |
          if [ "$GITHUB_RUN_ATTEMPT" != "1" ] && [ -s failed.txt ]; then
            echo "Re-run: executing only the previously-failed tests."
            npx vitest run $(cat failed.txt) -t "$NIJAM_TEST_NAME_PATTERN"
          else
            npm run test:unit
          fi
