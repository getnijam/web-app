name: Unit (vitest)

# Runs on every PR: install, then run the Vitest unit suite in-process (no preview
# deploy needed). Because the trigger is `pull_request`, branch + PR metadata exist
# natively (GITHUB_HEAD_REF, refs/pull/<n>/merge) and the Nijam Vitest reporter picks
# them up with zero config, so when the ingest secrets are present we also dogfood the
# run into Nijam, and the GitHub App posts a check/comment on the PR.
on:
  pull_request:

# One run per PR; a newer push cancels the older in-flight run.
concurrency:
  group: unit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the PR head
        uses: actions/checkout@v4
        with:
          # The real branch commit (what reviewers see), not the synthetic merge
          # commit, keeps the reported commit/author accurate for the Nijam run.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Attempt 1: run the whole suite. `continue-on-error` lets a failure through so the
      # retry below decides the job's final status (a flake that passes on the re-run
      # goes green).
      - name: Run unit tests
        id: unit
        continue-on-error: true
        env:
          # Optional: dogfood, upload the run to Nijam (the GitHub App then posts a
          # check/comment on the PR). Inert unless both are set; fork PRs get no
          # secrets, so they still run the suite but skip reporting. Use a dedicated
          # *vitest* project id (a Playwright project is locked to that framework).
          NIJAM_API_KEY: ${{ secrets.NIJAM_API_KEY }}
          NIJAM_PROJECT_ID: ${{ secrets.NIJAM_UNIT_PROJECT_ID }}
        run: npm run test:unit

      # If attempt 1 failed, ask Nijam which tests failed. fetch-failed is CI-safe (writes
      # an empty file + exits 0 on any error); --export-env writes NIJAM_RUN_GROUP /
      # NIJAM_RUN_ATTEMPT / NIJAM_RERUN + NIJAM_TEST_NAME_PATTERN so the retry clubs under
      # the original run and is tagged as a re-run.
      - name: Fetch the failed tests
        if: steps.unit.outcome == 'failure'
        env:
          NIJAM_API_KEY: ${{ secrets.NIJAM_API_KEY }}
          NIJAM_PROJECT_ID: ${{ secrets.NIJAM_UNIT_PROJECT_ID }}
        run: npx nijam-vitest fetch-failed --output failed.txt --export-env "$GITHUB_ENV"

      # Attempt 2: re-run ONLY the failed tests (the spec files in failed.txt, narrowed to
      # the failing test names). Falls back to the full suite if fetch-failed came back
      # empty (e.g. Nijam unreachable).
      - name: Re-run only the failed tests
        if: steps.unit.outcome == 'failure'
        env:
          NIJAM_API_KEY: ${{ secrets.NIJAM_API_KEY }}
          NIJAM_PROJECT_ID: ${{ secrets.NIJAM_UNIT_PROJECT_ID }}
        run: |
          if [ -s failed.txt ]; then
            npx vitest run $(cat failed.txt) -t "$NIJAM_TEST_NAME_PATTERN"
          else
            npm run test:unit
          fi
