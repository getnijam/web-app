name: E2E (Vercel preview)

# Vercel posts a `deployment_status` to GitHub when a deployment goes live. We run
# the Playwright suite against the preview URL it generated for the PR's commit.
# Note: deployment_status workflows always run the file from the DEFAULT branch, so
# changes to this file only take effect once merged to main.
on:
  deployment_status:

# One run per deployment; newer deployments cancel older in-flight runs for the SHA.
concurrency:
  group: e2e-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    # Only successful, non-production (preview) Vercel deployments that expose a URL.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment != 'Production' &&
      github.event.deployment_status.environment_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E against the Vercel preview
        env:
          # The exact preview URL Vercel generated for this deployment.
          NIJAM_E2E_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          # Required, or both specs skip themselves (the check would be a green no-op).
          NIJAM_E2E_EMAIL: ${{ secrets.NIJAM_E2E_EMAIL }}
          NIJAM_E2E_PASSWORD: ${{ secrets.NIJAM_E2E_PASSWORD }}
          # Optional: dogfood — upload the run to Nijam (the GitHub App then posts a
          # check/comment on the PR). Inert unless both are set.
          NIJAM_API_KEY: ${{ secrets.NIJAM_API_KEY }}
          NIJAM_PROJECT_ID: ${{ secrets.NIJAM_PROJECT_ID }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14
